<!DOCTYPE html>
<html>
<head>
    <title>Debug Auth</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; }
        input { padding: 8px; margin: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🔍 Debug de Autenticação</h1>
    
    <div class="section">
        <h3>1. Login Test</h3>
        <input type="email" id="email" value="admin@perfumaria.com" placeholder="Email">
        <input type="password" id="password" value="admin123" placeholder="Senha">
        <button onclick="testLogin()">Login</button>
        <div id="loginResult"></div>
    </div>
    
    <div class="section">
        <h3>2. localStorage</h3>
        <button onclick="showLocalStorage()">Mostrar localStorage</button>
        <button onclick="clearLocalStorage()">Limpar localStorage</button>
        <div id="storageResult"></div>
    </div>
    
    <div class="section">
        <h3>3. API Test</h3>
        <button onclick="testAPI()">Testar API Produtos</button>
        <button onclick="testCreateProduct()">Criar Produto</button>
        <div id="apiResult"></div>
    </div>

    <script>
        function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            fetch('http://localhost:3001/api/users/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loginResult').innerHTML = 
                    '<div class="success">✅ Login OK! Token: ' + data.token.substring(0, 50) + '...</div>';
                
                // Salvar token no localStorage
                localStorage.setItem('perfumaria_golden_admin_token', data.token);
                showLocalStorage();
            })
            .catch(error => {
                document.getElementById('loginResult').innerHTML = 
                    '<div class="error">❌ Login Error: ' + error.message + '</div>';
            });
        }
        
        function showLocalStorage() {
            const token = localStorage.getItem('perfumaria_golden_admin_token');
            const result = document.getElementById('storageResult');
            
            if (token) {
                result.innerHTML = 
                    '<div class="success">✅ Token encontrado: ' + token.substring(0, 50) + '...</div>';
            } else {
                result.innerHTML = 
                    '<div class="error">❌ Nenhum token encontrado</div>';
            }
        }
        
        function clearLocalStorage() {
            localStorage.removeItem('perfumaria_golden_admin_token');
            showLocalStorage();
        }
        
        function testAPI() {
            const token = localStorage.getItem('perfumaria_golden_admin_token');
            
            if (!token) {
                document.getElementById('apiResult').innerHTML = 
                    '<div class="error">❌ Faça login primeiro</div>';
                return;
            }
            
            fetch('http://localhost:3001/api/products', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('apiResult').innerHTML = 
                    '<div class="success">✅ API OK! Encontrados ' + data.docs.length + ' produtos</div>';
            })
            .catch(error => {
                document.getElementById('apiResult').innerHTML = 
                    '<div class="error">❌ API Error: ' + error.message + '</div>';
            });
        }
        
        function testCreateProduct() {
            const token = localStorage.getItem('perfumaria_golden_admin_token');
            
            if (!token) {
                document.getElementById('apiResult').innerHTML = 
                    '<div class="error">❌ Faça login primeiro</div>';
                return;
            }
            
            const product = {
                name: 'Produto Debug Browser',
                description: 'Teste direto do navegador',
                price: 99.90,
                category: 'Perfumes Masculinos',
                image: 'https://images.unsplash.com/photo-1523296848231-263a9c2a7a5a',
                stock: 5,
                featured: false,
                outOfStock: false,
                available: true
            };
            
            fetch('http://localhost:3001/api/products', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(product)
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            })
            .then(data => {
                document.getElementById('apiResult').innerHTML = 
                    '<div class="success">🎉 Produto criado! ID: ' + data.id + '</div>';
            })
            .catch(error => {
                document.getElementById('apiResult').innerHTML = 
                    '<div class="error">❌ Create Error: ' + error.message + '</div>';
            });
        }
        
        // Mostrar localStorage ao carregar
        showLocalStorage();
    </script>
</body>
</html>
